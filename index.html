<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bauzeitenplan</title>

<script>
  // Service Worker: hält die ES-Module dauerhaft aktuell (Begründung in sw.js).
  // Ohne ihn nimmt der Browser die Untermodule aus dem Cache und Änderungen
  // kommen nach einem Deploy nicht an. Pfad relativ → trägt auch unter
  // /Bauzeitenplan/ auf GitHub Pages.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function () {});
    var _swReloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (_swReloaded) return; _swReloaded = true; location.reload();
    });
  }
</script>

<!-- Struktur (Geometrie + Verhalten) und Gestaltung sind getrennt.
     Der Theme-Link ist der einzige Umschaltpunkt: styles/themes/ enthält vier
     fertige Ebenen (console = aktiv). Siehe docs/themes.md. -->
<link rel="stylesheet" href="styles/base.css?v=0.1.1">
<link rel="stylesheet" href="styles/themes/console.css?v=0.1.1" id="theme-css" data-theme-name="console">
</head>
<body>

<div class="app">
  <header class="hd">
    <div class="hd-row hd-top">
      <div class="hd-id">
        <div class="hd-kicker">Bauzeitenplan</div>
        <h1 class="hd-title" id="proj-name">—</h1>
        <div class="hd-sub" id="proj-venue"></div>
      </div>
      <div class="kpis" id="kpis"></div>
    </div>

    <div class="hd-row hd-bar">
      <div class="seg" role="group" aria-label="Ansicht">
        <button data-view="gantt">Gantt</button>
        <button data-view="tabelle">Tabelle</button>
      </div>

      <div class="hd-zoom">
        <div class="seg" role="group" aria-label="Zoomstufe">
          <button data-z="monate">Monate</button>
          <button data-z="wochen">Wochen</button>
          <button data-z="tage">Tage</button>
          <button data-z="stunden">Stunden</button>
        </div>
        <div class="seg seg-icon" role="group" aria-label="Zoom">
          <button id="zout" aria-label="Herauszoomen">−</button>
          <button id="zin" aria-label="Hineinzoomen">+</button>
        </div>
        <button class="btn" id="now">Heute</button>
        <input type="date" class="date-jump" id="date-jump" title="Zu einem Datum springen" aria-label="Zu einem Datum springen">
        <div class="seg seg-icon" role="group" aria-label="Tag wechseln">
          <button id="date-prev" title="Ein Tag zurück" aria-label="Ein Tag zurück">◀</button>
          <button id="date-next" title="Ein Tag vor" aria-label="Ein Tag vor">▶</button>
        </div>
        <button class="btn" id="fold">Alle zuklappen</button>
      </div>

      <div class="seg seg-icon" role="group" aria-label="Rückgängig">
        <button id="undo" title="Rückgängig (⌘Z)" aria-label="Rückgängig">↺</button>
        <button id="redo" title="Wiederholen (⇧⌘Z)" aria-label="Wiederholen">↻</button>
      </div>

      <button class="btn btn-warn" id="resolve" hidden></button>
      <button class="btn btn-live" id="live" aria-pressed="false" title="Zeitlinie läuft mit, Ansicht folgt">Live</button>
      <div class="live-bar" id="live-bar" hidden></div>

      <div class="hd-right">
        <span class="save-state" id="save-state" data-state="saved">gesichert</span>
        <button class="btn" id="add-gewerk">+ Gewerk</button>
        <button class="btn" id="export" title="Sicherung herunterladen">Export</button>
        <button class="btn" id="import">Import</button>
        <button class="btn" id="new-proj">Neu</button>
        <button class="btn" id="proj-menu">Projekte</button>
      </div>
    </div>

    <div class="legend" id="legend"></div>
  </header>

  <div class="work">
    <div class="bz" id="bz" tabindex="-1"></div>
    <div class="tb" id="tb" hidden></div>
    <aside class="ins" id="ins" hidden></aside>
  </div>

  <footer class="ft">
    <div class="ft-mini" id="mini"></div>
    <div class="ft-keys">
      <span><kbd>⌘</kbd>+Rad zoomt am Cursor</span>
      <span><kbd>⇧</kbd>+Rad scrollt seitwärts</span>
      <span><kbd>H</kbd> springt zu heute</span>
      <span><kbd>⌘Z</kbd> rückgängig</span>
      <span>Rechtsklick öffnet das Menü · Doppelklick benennt um</span>
      <span class="ft-crit"><i></i> kritischer Pfad — kein Puffer</span>
      <span class="ft-ver" id="ver" title="Version — node tools/version.mjs zeigt sie, node tools/version.mjs 0.2.0 setzt sie"></span>
    </div>
  </footer>
</div>

<div class="dlg" id="dlg" hidden></div>
<div class="toast" id="toast" role="status" hidden></div>
<input type="file" id="import-file" accept="application/json,.json" hidden>

<script type="module" src="js/app.js?v=0.1.1"></script>
</body>
</html>
